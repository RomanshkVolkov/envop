name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Evita publicar una release cuyo tag no coincide con la versión de Cargo.toml
  # (el binario embebe CARGO_PKG_VERSION, así que deben ir sincronizados).
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify tag matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG" ]; then
            echo "::error::El tag $GITHUB_REF_NAME no coincide con la versión de Cargo.toml ($CARGO_VERSION)."
            exit 1
          fi
          echo "OK: $GITHUB_REF_NAME == Cargo.toml $CARGO_VERSION"

  release:
    needs: check-version
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu,  asset: envop-linux-amd64 }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, asset: envop-linux-arm64,  cross: true }
          - { os: macos-latest,  target: x86_64-apple-darwin,       asset: envop-darwin-amd64 }
          - { os: macos-latest,  target: aarch64-apple-darwin,      asset: envop-darwin-arm64 }
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          SRC="target/${{ matrix.target }}/release/envop"
          [ -f "${SRC}.exe" ] && SRC="${SRC}.exe"
          cp "$SRC" "dist/${{ matrix.asset }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ matrix.asset }}
          generate_release_notes: true
